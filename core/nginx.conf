# VPN-Starter-Kit :: core/nginx.conf
# Front door on :80. Routes WebSocket paths to local Xray inbounds.
# Deployed to /etc/nginx/conf.d/vpn.conf by the installer.

# WebSocket upgrade mapping — required for the Upgrade handshake to survive.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # --- VLESS over WebSocket -> Xray :10001 ---
    location /vless {
        if ($http_upgrade != "websocket") {
            return 404;
        }
        proxy_pass http://127.0.0.1:10001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # --- VMess over WebSocket -> Xray :10002 ---
    location /vmess {
        if ($http_upgrade != "websocket") {
            return 404;
        }
        proxy_pass http://127.0.0.1:10002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Everything else looks like a plain, boring web server.
    location / {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}